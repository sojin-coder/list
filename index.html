<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Firebase CRUD</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- SweetAlert -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

 <link rel="stylesheet" href="./style.css">
</head>

<body>

<!-- Loading -->
<div class="loading-screen">
  <div class="loader"></div>
</div>

<div class="container mt-5">
  <h3 class="text-center mb-5">បញ្ជីឈ្មោះអ្នកចូលរួម</h3>

  <!-- FORM -->
  <form id="form" class="row g-3">
  <div class="col-12">
    <input name="full_name" class="form-control" placeholder="សូមបញ្ចូលឈ្មោះ" required>
  </div>
  
  <div class="col-12">
    <input name="address" class="form-control" placeholder="អាស័យដ្ឋាន" required>
  </div>
  
  <div class="col-12">
    <input name="money" class="form-control" placeholder="ចំនួនទឺកប្រាក់" required>
  </div>
  
  <div class="col-12">
    <button class="btn btn-primary">បញ្ចូល</button>
  </div>
</form>

  <hr>

  <!-- TABLE -->
  <table class="table table-bordered">
    <thead class="table-dark">
      <tr>
        <th>#</th>
        <th>ឈ្មោះ</th>
        <th>អាស័យដ្ឋាន</th>
        <th>ចំនួនទឺកប្រាក់</th>
        <th>សកម្មភាព</th>
      </tr>
    </thead>
    <tbody id="tbl"></tbody>
  </table>
</div>

<!-- MODAL -->
<div class="modal fade" id="modal">
  <div class="modal-dialog">
    <form id="form-update" class="modal-content">
      <div class="modal-header">
        <h5>កែ</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input type="hidden" id="u_id">
        <input id="u_name" class="form-control mb-2" placeholder="ឈ្មោះ">
        <input id="u_address" class="form-control mb-2" placeholder="អាស័យដ្ឋាន">
        <input id="u_money" class="form-control mb-2" placeholder="ចំនួនទឺកប្រាក់">
      </div>

      <div class="modal-footer">
        <button class="btn btn-success">កែ</button>
      </div>
    </form>
  </div>
</div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="./script.js"></script>
</body>
