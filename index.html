<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Digital Registry | Smart Management</title>
  
  <!-- Bootstrap 5 + Icons + Fonts -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Noto+Sans+Khmer:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  
 <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="glow-orb"></div>
<div class="glow-orb-bottom"></div>

<div class="container py-4 py-md-5">
  <!-- header section -->
  <div class="text-center mb-5">
    <div class="d-inline-block px-4 py-2 rounded-pill bg-dark bg-opacity-40 backdrop-blur-sm mb-3 border border-info border-opacity-25">
      <i class="fas fa-cloud-arrow-up text-info me-2"></i><span class="small fw-semibold text-info">REAL-TIME SYNC ACTIVE</span>
    </div>
    <h1 class="display-5 fw-bold" style="background: linear-gradient(125deg, #fff, #9effff); -webkit-background-clip: text; background-clip: text; color: transparent;">
      <i class="fas fa-database me-2"></i> ប្រព័ន្ធចុះឈ្មោះឌីជីថល
    </h1>
    <p class="text-light-50 mt-2 opacity-75">សមកាលកម្មពេលវេលាជាក់ស្តែង · គ្រប់គ្រងទិន្នន័យឆ្លាតវៃ</p>
  </div>

  <!-- FORM INPUT SECTION (ផ្នែកបញ្ចូលទិន្នន័យ - ខាងលើ) -->
  <div class="row justify-content-center mb-5">
    <div class="col-lg-8 col-md-10">
      <div class="glass-ultra p-4">
        <div class="d-flex align-items-center gap-2 mb-4">
          <i class="fas fa-user-plus fa-2x text-info"></i>
          <h4 class="mb-0 fw-semibold">ទម្រង់បញ្ចូលទិន្នន័យសមាជិក</h4>
        </div>
        <form id="addForm">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label small text-info mb-1"><i class="fas fa-user"></i> ឈ្មោះពេញ</label>
              <input type="text" id="nameInp" class="input-neon" placeholder="ឧទាហរណ៍៖ សុខ សុផល" autocomplete="off" required />
            </div>
            <div class="col-md-4">
              <label class="form-label small text-info mb-1"><i class="fas fa-location-dot"></i> អាសយដ្ឋាន</label>
              <input type="text" id="addrInp" class="input-neon" placeholder="ភូមិ/សង្កាត់/ក្រុង" required />
            </div>
            <div class="col-md-4">
              <label class="form-label small text-info mb-1"><i class="fas fa-dollar-sign"></i> ថវិកា (USD)</label>
              <input type="number" id="moneyInp" class="input-neon" placeholder="ចំនួនទឹកប្រាក់" step="any" required />
            </div>
          </div>
          <div class="mt-4">
            <button type="submit" class="btn-cyber"><i class="fas fa-save me-2"></i> រក្សាទុកទិន្នន័យ</button>
          </div>
        </form>
        <!-- <div class="mt-3 text-center small text-info opacity-50">
          <i class="fas fa-shield-alt me-1"></i> ទិន្នន័យត្រូវបានរក្សាទុកក្នុង Firebase Firestore (ពេលវេលាជាក់ស្តែង)
        </div> -->
      </div>
    </div>
  </div>

  <!-- FORM OUTPUT SECTION (ផ្នែកបង្ហាញលទ្ធផល - ខាងក្រោម) -->
  <div class="row justify-content-center">
    <div class="col-lg-10 col-md-12">
      <div class="glass-ultra p-4">
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
          <h5 class="mb-0"><i class="fas fa-table-list me-2 text-info"></i> បញ្ជីសមាជិកទាំងអស់</h5>
          <span class="badge-counter mt-2 mt-sm-0" id="countLabel"><i class="fas fa-user-check me-1"></i>0 នាក់</span>
        </div>
        <div class="table-responsive" style="max-height: 500px; overflow-y: auto;">
          <table class="table-futuristic">
            <thead>
              <tr>
                <th>#</th>
                <th>ឈ្មោះពេញ</th>
                <th>អាសយដ្ឋាន</th>
                <th class="text-end">ថវិកា</th>
                <th class="text-center">សកម្មភាព</th>
              </tr>
            </thead>
            <tbody id="listBody">
              <tr>
                <td colspan="5" class="text-center py-5 opacity-50">
                  <i class="fas fa-spinner fa-pulse fa-2x mb-2 d-block"></i>
                  កំពុងផ្ទុកទិន្នន័យ...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Edit -->
<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content modal-cyber">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold text-info"><i class="fas fa-pen-fancy me-2"></i>កែសម្រួលព័ត៌មាន</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body pt-3">
        <input type="hidden" id="editId" />
        <label class="small text-info mb-1">ឈ្មោះពេញ</label>
        <input type="text" id="editName" class="input-neon mb-3" placeholder="ឈ្មោះពេញ" />
        <label class="small text-info mb-1">អាសយដ្ឋាន</label>
        <input type="text" id="editAddr" class="input-neon mb-3" placeholder="អាសយដ្ឋាន" />
        <label class="small text-info mb-1">ថវិកា (USD)</label>
        <input type="number" id="editMoney" class="input-neon mb-3" placeholder="ថវិកា" step="any" />
        <button id="updateBtn" class="btn-cyber mt-2"><i class="fas fa-check-circle me-2"></i> បញ្ជាក់ការកែប្រែ</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Firebase Modular SDK -->
<script type="module" src="./script.js">
  
</script>

</body>
</html>
