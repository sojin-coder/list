<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Digital Registry | Centered Form & Glassmorphism</title>
  <!-- Bootstrap 5 + Icons + Khmer Fonts -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="glowing-orb" id="orb-1"></div>
<div class="glowing-orb" id="orb-2"></div>

<div class="main-wrapper">
  <div class="registry-container">
    <!-- Header Section -->
    <div class="digital-header mb-4">
      <div class="glow-icon mx-auto">
        <i class="fas fa-users-viewfinder"></i>
      </div>
      <h1 class="fw-bold">បញ្ជីឈ្មោះអ្នកចូលរួម</h1>
      <p class="text-light-emphasis">Digital Hub • Real-time Sync • Glass Interface</p>
    </div>

    <!-- FORM FULLY CENTERED (top row, centered in the middle) -->
    <div class="row g-4 justify-content-center">
      <div class="col-md-8 col-lg-6 col-xl-5">
        <div class="glass-card form-card-centered">
          <div class="card-header-modern">
            <i class="fas fa-user-plus me-2 text-info"></i> បញ្ចូលទិន្នន័យថ្មី
          </div>
          <form id="participantForm">
            <div class="input-group-v2">
              <i class="fas fa-user icon"></i>
              <input type="text" id="fullName" class="form-control-v2" placeholder="ឈ្មោះពេញ" autocomplete="off" required />
            </div>
            <div class="input-group-v2">
              <i class="fas fa-map-marker-alt icon"></i>
              <input type="text" id="address" class="form-control-v2" placeholder="អាស័យដ្ឋាន" autocomplete="off" required />
            </div>
            <div class="input-group-v2">
              <i class="fas fa-coins icon"></i>
              <input type="number" id="money" class="form-control-v2" placeholder="ចំនួនទឹកប្រាក់ ($ / ៛)" required />
            </div>
            <button type="submit" class="btn-digital-neon mt-2">
              <i class="fas fa-save me-2"></i> រក្សាទុកក្នុងប្រព័ន្ធ
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- TABLE SECTION (below form, full width) -->
    <div class="row mt-5">
      <div class="col-12">
        <div class="glass-card">
          <div class="d-flex flex-wrap justify-content-between align-items-center mb-3">
            <div class="card-header-modern mb-0">
              <i class="fas fa-list-check me-2"></i> បញ្ជីសរុបអ្នកចូលរួម
            </div>
            <span class="status-badge"><i class="fas fa-circle me-1" style="font-size: 8px; color: #0f0;"></i> ផ្ទាល់ &nbsp;|&nbsp; <span id="recordCount">0</span> នាក់</span>
          </div>
          <div class="table-responsive">
            <table class="table-custom">
              <thead>
                <tr>
                  <th class="text-center">#</th>
                  <th>ឈ្មោះពេញ</th>
                  <th>អាស័យដ្ឋាន</th>
                  <th class="text-end">ថវិកា</th>
                  <th class="text-center">សកម្មភាព</th>
                </tr>
              </thead>
              <tbody id="participantTableBody">
                <tr><td colspan="5" class="text-center py-5"><div class="digital-loader"><div class="circle" style="width:32px;height:32px;margin:0 auto;"></div></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- EDIT MODAL (glass) -->
<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content-digital">
      <div class="modal-header-digital">
        <h5 class="modal-title"><i class="fas fa-pen-fancy me-2"></i>កែតម្រូវទិន្នន័យ</h5>
        <button type="button" class="btn-close-digital" data-bs-dismiss="modal" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body p-4">
        <input type="hidden" id="editId" />
        <div class="input-group-v2 mb-3">
          <i class="fas fa-user icon"></i>
          <input type="text" id="editName" class="form-control-v2" placeholder="ឈ្មោះពេញ" />
        </div>
        <div class="input-group-v2 mb-3">
          <i class="fas fa-map-marker-alt icon"></i>
          <input type="text" id="editAddress" class="form-control-v2" placeholder="អាស័យដ្ឋាន" />
        </div>
        <div class="input-group-v2 mb-2">
          <i class="fas fa-coins icon"></i>
          <input type="number" id="editMoney" class="form-control-v2" placeholder="ចំនួនទឹកប្រាក់" />
        </div>
      </div>
      <div class="modal-footer-digital">
        <button type="button" class="btn btn-secondary" style="background:#2d3e5f; border:none;" data-bs-dismiss="modal">បោះបង់</button>
        <button type="button" id="confirmUpdateBtn" class="btn-digital-neon" style="padding: 10px 24px;">រក្សាការផ្លាស់ប្តូរ</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="./script.js">
 
</script>
</body>
</html>
